name: Build

# One job per architecture and shipped variant. This spends more total runner
# time than building all variants serially per architecture, but release/nightly
# wall-clock time is dominated by the slowest variant instead of the sum of all
# variants.

on:
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: true
      release_tag_name:
        type: string
        default: ''
        description: 'release tag to upload assets to; defaults to tag_name'
      release_draft:
        type: boolean
        default: false
        description: 'upload assets to a draft release'
      os_id:
        type: string
        default: ubuntu24
      package_manager:
        type: string
        default: apt
        description: 'apt, dnf, or yum'
      container_image:
        type: string
        required: true
      arch:
        type: string
        default: amd64
        description: 'amd64 or arm64'
      prerelease:
        type: boolean
        default: false
        description: 'mark the release as a prerelease (used by nightly)'
      upload_release_assets:
        type: boolean
        default: true
        description: 'upload packaged assets to a GitHub release'
      upload_workflow_artifacts:
        type: boolean
        default: false
        description: 'upload packaged assets as workflow artifacts'
      with_jemalloc:
        type: boolean
        default: false
        description: 'build eloqkv packages with -DWITH_JEMALLOC=ON'

jobs:
  build:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: rocksdb
            data_store: ROCKSDB
            log_state: ROCKSDB
            build_dss: "false"
            build_rocksdb_tools: "true"
            cmake_extra: ""
          - id: rocks_s3
            data_store: ELOQDSS_ROCKSDB_CLOUD_S3
            log_state: ROCKSDB_CLOUD_S3
            build_dss: "true"
            build_rocksdb_tools: "true"
            cmake_extra: -DWITH_CLOUD_AZ_INFO=ON
          - id: eloqstore_local
            data_store: ELOQDSS_ELOQSTORE
            log_state: ROCKSDB
            build_dss: "true"
            build_rocksdb_tools: "false"
            cmake_extra: ""
          - id: eloqstore_s3
            data_store: ELOQDSS_ELOQSTORE
            log_state: ROCKSDB_CLOUD_S3
            build_dss: "true"
            build_rocksdb_tools: "false"
            cmake_extra: -DWITH_CLOUD_AZ_INFO=ON
          - id: eloqstore_gcs
            data_store: ELOQDSS_ELOQSTORE
            log_state: ROCKSDB_CLOUD_GCS
            build_dss: "true"
            build_rocksdb_tools: "false"
            cmake_extra: ""
    container:
      image: ${{ inputs.container_image }}
      options: --user root
    name: ${{ inputs.tag_name }}-${{ inputs.arch }}-${{ matrix.id }}
    # In the container the default run shell is `sh` (dash); force bash so the
    # packaging step's arrays / here-strings / `set -o pipefail` work.
    defaults:
      run:
        shell: bash
    env:
      TAGGED: ${{ inputs.tag_name }}
      ARCH: ${{ inputs.arch }}
      OS_ID: ${{ inputs.os_id }}
      VARIANT_ID: ${{ matrix.id }}
      WITH_DATA_STORE_VALUE: ${{ matrix.data_store }}
      WITH_LOG_STATE_VALUE: ${{ matrix.log_state }}
      BUILD_DSS: ${{ matrix.build_dss }}
      BUILD_ROCKSDB_TOOLS: ${{ matrix.build_rocksdb_tools }}
      CMAKE_EXTRA: ${{ matrix.cmake_extra }}
      ELOQ_THIRD_PARTY_PREFIX: /opt/eloq/third_party
      CMAKE_PREFIX_PATH: /opt/eloq/third_party
      CMAKE_INCLUDE_PATH: /opt/eloq/third_party/include
      CMAKE_LIBRARY_PATH: /opt/eloq/third_party/lib
      LD_LIBRARY_PATH: /opt/eloq/third_party/lib
      WITH_JEMALLOC: ${{ inputs.with_jemalloc }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          path: eloqkv_src

      - name: Checkout product submodules
        run: |
          git config --global --add safe.directory '*'
          cd "$GITHUB_WORKSPACE/eloqkv_src"
          bash scripts/checkout_product_submodules.sh

          if [ -e data_substrate/third_party/src/brpc/.git ]; then
            echo "Unexpected third-party source checkout: data_substrate/third_party/src/brpc" >&2
            exit 1
          fi

      - name: Setup third-party (cached)
        uses: ./eloqkv_src/.github/actions/setup-third-party
        with:
          source-dir: ${{ github.workspace }}/eloqkv_src
          arch: ${{ inputs.arch }}
          cache-scope: ubuntu-dev

      - name: Install build dependencies
        run: |
          set -euo pipefail
          case "${{ inputs.package_manager }}" in
            apt)
              apt-get update -qq
              apt_packages=(postgresql-client rsync patchelf)
              if [ "${WITH_JEMALLOC}" = "true" ]; then
                apt_packages+=(libjemalloc-dev pkg-config)
              fi
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq "${apt_packages[@]}"
              ;;
            dnf)
              dnf_packages=(postgresql-devel rsync patchelf)
              if [ "${WITH_JEMALLOC}" = "true" ]; then
                dnf_packages+=(jemalloc-devel pkgconf-pkg-config)
              fi
              dnf install -y "${dnf_packages[@]}"
              ;;
            yum)
              yum_packages=(postgresql-devel rsync patchelf)
              if [ "${WITH_JEMALLOC}" = "true" ]; then
                yum_packages+=(jemalloc-devel pkgconfig)
              fi
              yum install -y "${yum_packages[@]}"
              ;;
          esac

      - name: Build and package variant
        working-directory: ${{ github.workspace }}/eloqkv_src
        run: |
          set -euo pipefail

          write_license() {
            printf '%s\n' \
              'License' '' \
              'Copyright (c) 2024-2026 EloqData' '' \
              'Permission is hereby granted, free of charge, to any person obtaining a copy' \
              'of this software and associated documentation files (the "Software"), to use,' \
              'copy, modify, and distribute the Software, subject to the following conditions:' '' \
              'The above copyright notice and this permission notice shall be included in all' \
              'copies or substantial portions of the Software.' '' \
              'THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR' \
              'IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,' \
              'FITNESS FOR A PARTICULAR PURPOSE, AND NONINFRINGEMENT. IN NO EVENT SHALL ELOQDATA' \
              'OR ITS CONTRIBUTORS BE LIABLE FOR ANY CLAIM, DAMAGES, OR OTHER LIABILITY, WHETHER' \
              'IN AN ACTION OF CONTRACT, TORT, OR OTHERWISE, ARISING FROM, OUT OF, OR IN' \
              'CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.' '' \
              'IMPORTANT: By using this software, you acknowledge that EloqData shall not be' \
              'liable for any loss or damage, including but not limited to loss of data, arising' \
              'from the use of the software. The responsibility for backing up any data, checking' \
              "the software's appropriateness for your needs, and using it within the bounds of" \
              'the law lies entirely with you.' \
              > "$1"
          }

          # Copy a binary's non-glibc shared-lib deps next to it (build_tarball.bash logic).
          bundle_libs() {
            local bin="$1" dest="$2"
            ldd "$bin" 2>/dev/null | awk 'NF==4 {print $(NF-1)}' | while read -r lib; do
              [ -e "$lib" ] || continue
              case "$(basename "$lib")" in
                libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|libanl.so*|libresolv.so*|libutil.so*|libnsl.so*|ld-linux*.so*) ;;
                *) cp -n "$lib" "$dest/" 2>/dev/null || true ;;
              esac
            done
          }

          eloqkv_cmake_extra=()
          if [ "${WITH_JEMALLOC}" = "true" ]; then
            eloqkv_cmake_extra+=(-DWITH_JEMALLOC=ON)
          fi

          id="${VARIANT_ID}"
          dst="${WITH_DATA_STORE_VALUE}"
          lst="${WITH_LOG_STATE_VALUE}"
          dss="${BUILD_DSS}"
          rtools="${BUILD_ROCKSDB_TOOLS}"
          extra="${CMAKE_EXTRA}"
          echo "::group::Build variant ${id} (${ARCH})"

          # --- eloqkv ---
          rm -rf build
          # shellcheck disable=SC2086
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DWITH_DATA_STORE="${dst}" \
            -DWITH_LOG_STATE="${lst}" \
            -DWITH_LOG_SERVICE=ON \
            -DDISABLE_CKPT_REPORT=ON \
            -DDISABLE_CODE_LINE_IN_LOG=ON \
            -DWITH_ASAN=OFF \
            -DELOQ_THIRD_PARTY_PREFIX=/opt/eloq/third_party \
            -DELOQ_THIRD_PARTY_REQUIRED=ON \
            ${extra} \
            "${eloqkv_cmake_extra[@]}"
          cmake --build build -j"$(nproc)"

          DEST_DIR="$HOME/EloqKV"
          rm -rf "$DEST_DIR"
          mkdir -p "$DEST_DIR/bin" "$DEST_DIR/lib" "$DEST_DIR/conf"
          cp build/eloqkv "$DEST_DIR/bin/"
          cp build/data_substrate/host_manager "$DEST_DIR/bin/"

          if [ "${rtools}" = "true" ]; then
            for tool in eloqkv_to_aof eloqkv_to_rdb; do
              if [ -x "build/$tool" ]; then
                cp "build/$tool" "$DEST_DIR/bin/"
              else
                echo "skip $tool (not built for ${dst})"
              fi
            done
          fi

          if [ "${dss}" = "true" ]; then
            DSS_SRC="$PWD/data_substrate/store_handler/eloq_data_store_service"
            rm -rf "$DSS_SRC/build"
            cmake -S "$DSS_SRC" -B "$DSS_SRC/build" \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DWITH_DATA_STORE="${dst}" \
              -DELOQ_THIRD_PARTY_PREFIX=/opt/eloq/third_party \
              -DELOQ_THIRD_PARTY_REQUIRED=ON
            cmake --build "$DSS_SRC/build" -j"$(nproc)"
            cp "$DSS_SRC/build/dss_server" "$DEST_DIR/bin/"
          fi

          for bin in "$DEST_DIR"/bin/*; do bundle_libs "$bin" "$DEST_DIR/lib"; done
          find "$DEST_DIR/lib" \
            \( -name 'libbrpc*' -o -name 'libbraft*' -o -name 'libleveldb*' -o -name 'librocksdb*' \) \
            -exec patchelf --set-rpath '$ORIGIN' {} \; 2>/dev/null || true
          cp eloqkv.ini "$DEST_DIR/conf/"
          write_license "$DEST_DIR/LICENSE.txt"
          tar -czf "$GITHUB_WORKSPACE/eloqkv-${TAGGED}-${id}-${OS_ID}-${ARCH}.tar.gz" -C "$HOME" EloqKV

          # --- log-service ---
          LOG_SRC="$PWD/data_substrate/eloq_log_service"
          rm -rf "$LOG_SRC/build" "$LOG_SRC/LogServer"
          mkdir -p "$LOG_SRC/LogServer/bin" "$LOG_SRC/LogServer/lib"
          # shellcheck disable=SC2086
          cmake -S "$LOG_SRC" -B "$LOG_SRC/build" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DWITH_LOG_STATE="${lst}" \
            -DWITH_ASAN=OFF \
            -DDISABLE_CODE_LINE_IN_LOG=ON \
            -DELOQ_THIRD_PARTY_PREFIX=/opt/eloq/third_party \
            -DELOQ_THIRD_PARTY_REQUIRED=ON \
            ${extra}
          cmake --build "$LOG_SRC/build" -j"$(nproc)"
          mv "$LOG_SRC/build/launch_sv" "$LOG_SRC/LogServer/bin/"
          bundle_libs "$LOG_SRC/LogServer/bin/launch_sv" "$LOG_SRC/LogServer/lib"
          tar -czf "$GITHUB_WORKSPACE/log-service-${TAGGED}-${id}-${OS_ID}-${ARCH}.tar.gz" -C "$LOG_SRC" LogServer

          echo "::endgroup::"

      - name: Upload assets to release
        if: ${{ inputs.upload_release_assets }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag_name || inputs.tag_name }}
          name: ${{ inputs.release_tag_name || inputs.tag_name }}
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.release_draft }}
          files: |
            eloqkv-*-${{ inputs.arch }}.tar.gz
            log-service-*-${{ inputs.arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged assets as workflow artifact
        if: ${{ inputs.upload_workflow_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ inputs.tag_name }}-${{ inputs.arch }}-${{ matrix.id }}
          path: |
            eloqkv-*-${{ inputs.arch }}.tar.gz
            log-service-*-${{ inputs.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7
