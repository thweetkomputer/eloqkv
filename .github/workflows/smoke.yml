name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tcl:
    runs-on: ubuntu-latest
    container:
      image: eloqdata/eloq-dev-ci-ubuntu2404:latest
      options: --user root --security-opt seccomp=unconfined

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j$(nproc)

      - name: Run TCL tests
        run: |
          source .github/scripts/common.sh
          current_user=$(whoami)
          mkdir -p /home/$current_user/workspace
          ln -sf $GITHUB_WORKSPACE /home/$current_user/workspace/eloqkv

          ./build/eloqkv --port 6379 --eloq_store_buffer_pool_size=1MB --eloq_store_open_files_limit=512 --logtostderr > /tmp/eloqkv.log 2>&1 &
          wait_until_ready || { cat /tmp/eloqkv.log; exit 1; }

          run_tcl_tests all Debug

          kill $(jobs -p) 2>/dev/null || true
