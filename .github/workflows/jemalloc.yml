name: Jemalloc Release

on:
  push:
    branches: [jemalloc]
  workflow_dispatch:

concurrency:
  group: jemalloc-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  prepare:
    name: Create staging release
    runs-on: ubuntu-24.04
    outputs:
      staging_tag: ${{ steps.staging.outputs.tag }}
    steps:
      - name: Create run-specific staging prerelease
        id: staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          staging_tag="release-staging-jemalloc-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "tag=${staging_tag}" >> "$GITHUB_OUTPUT"

          gh release delete "${staging_tag}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || true
          gh release create "${staging_tag}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Jemalloc staging ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
            --notes "Staged jemalloc build from ${GITHUB_SHA} with -DWITH_JEMALLOC=ON." \
            --prerelease \
            --draft

  call-build:
    needs: prepare
    name: ${{ matrix.arch }}
    uses: ./.github/workflows/build.yml
    with:
      tag_name: jemalloc
      release_tag_name: ${{ needs.prepare.outputs.staging_tag }}
      prerelease: true
      release_draft: true
      upload_release_assets: true
      upload_workflow_artifacts: false
      with_jemalloc: true
      arch: ${{ matrix.arch }}
      os_id: ubuntu24
      package_manager: apt
      container_image: eloqdata/ubuntu-dev:24.04
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

  publish:
    name: Publish jemalloc release
    needs: [prepare, call-build]
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Cleanup staging release after failed build
        if: ${{ needs.call-build.result != 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAGING_TAG: ${{ needs.prepare.outputs.staging_tag }}
        run: |
          set -euo pipefail
          gh release delete "${STAGING_TAG}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          exit 1

      - name: Verify staged assets and switch jemalloc
        if: ${{ needs.call-build.result == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAGING_TAG: ${{ needs.prepare.outputs.staging_tag }}
        run: |
          set -euo pipefail

          cleanup_staging() {
            gh release delete "${STAGING_TAG}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || true
          }
          trap cleanup_staging ERR

          asset_count="$(gh release view "${STAGING_TAG}" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')"
          expected_assets=20
          if [ "${asset_count}" -ne "${expected_assets}" ]; then
            printf 'Expected %s jemalloc assets, found %s:\n' "${expected_assets}" "${asset_count}" >&2
            gh release view "${STAGING_TAG}" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' >&2
            cleanup_staging
            exit 1
          fi

          notes_file="$(mktemp)"
          printf 'Rolling jemalloc build from %s with -DWITH_JEMALLOC=ON.\n' "$GITHUB_SHA" > "${notes_file}"

          gh release delete jemalloc --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/jemalloc" >/dev/null 2>&1 || true
          gh release edit "${STAGING_TAG}" \
            --repo "$GITHUB_REPOSITORY" \
            --tag jemalloc \
            --target "$GITHUB_SHA" \
            --title "Jemalloc" \
            --notes-file "${notes_file}" \
            --prerelease \
            --draft=false

          trap - ERR
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${STAGING_TAG}" >/dev/null 2>&1 || true

          if stale_tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '.[] | select(.draft == true and (.tag_name | startswith("release-staging-jemalloc-"))) | .tag_name' 2>/dev/null)"; then
            while IFS= read -r stale_tag; do
              [ -n "${stale_tag}" ] || continue
              echo "Deleting stale jemalloc staging draft ${stale_tag}"
              gh release delete "${stale_tag}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
            done <<< "${stale_tags}"
          else
            echo "Skipping stale jemalloc staging draft cleanup; unable to list releases."
          fi
